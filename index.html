<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Assistant</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        #chat-box { height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 1rem; margin-bottom: 1rem; background: #f9f9f9; }
        input, button { width: 100%; padding: 0.8rem; margin-top: 0.5rem; box-sizing: border-box; }
        button { cursor: pointer; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <h2>Business Assistant (Gemini)</h2>
    <input type="password" id="api-key" placeholder="Enter Gemini API Key" oninput="saveKey()">
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="Ask something...">
    <button onclick="sendMessage()">Send Message</button>

    <script>
        // Load key from storage on startup
        window.onload = () => {
            const savedKey = localStorage.getItem('gemini-api-key');
            if (savedKey) document.getElementById('api-key').value = savedKey;
        };

        // Save key to storage whenever changed
        function saveKey() {
            const key = document.getElementById('api-key').value;
            localStorage.setItem('gemini-api-key', key);
        }

        async function sendMessage() {
            const apiKey = document.getElementById('api-key').value;
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const prompt = inputField.value;

            if (!apiKey) return alert("Please enter your Gemini API Key.");
            if (!prompt) return;

            chatBox.innerHTML += `<div><b>You:</b> ${prompt}</div>`;
            inputField.value = '';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                const botReply = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<div><b>Assistant:</b> ${botReply}</div>`;
            } catch (error) {
                chatBox.innerHTML += `<div><b>Error:</b> Could not connect to Gemini. Check your API key.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
