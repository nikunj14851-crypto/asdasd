<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Business Assistant</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        #chat-box { height: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 1rem; margin-bottom: 1rem; }
        input, button { width: 100%; padding: 0.5rem; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <h2>Business Assistant</h2>
    <input type="password" id="api-key" placeholder="Enter OpenAI API Key">
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>

    <script>
        async function sendMessage() {
            const apiKey = document.getElementById('api-key').value;
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!apiKey) return alert("Please enter API Key");
            
            chatBox.innerHTML += `<div><b>You:</b> ${input.value}</div>`;
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [{role: "system", content: "You are a helpful business assistant."}, {role: "user", content: input.value}]
                })
            });
            const data = await response.json();
            chatBox.innerHTML += `<div><b>Bot:</b> ${data.choices[0].message.content}</div>`;
            input.value = '';
        }
    </script>
</body>
</html>
